name: release

# Builds cross-platform binaries + a linux/amd64 Docker image when a tag
# matching v*.*.* is pushed. Tag flow:
#
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build higgsgo
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o dist/higgsgo-${GOOS}-${GOARCH} \
            ./cmd/higgsgo
          go build -trimpath \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o dist/higgsgo-cli-${GOOS}-${GOARCH} \
            ./cmd/higgsgo-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: higgsgo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/higgsgo:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/higgsgo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [binaries, docker]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
