name: release

# Builds cross-platform binaries + a linux/amd64 Docker image when a tag
# matching v*.*.* is pushed. Tag flow:
#
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm --dir webui install --frozen-lockfile
      - run: pnpm --dir webui build

      - name: Build higgsgo
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%FT%TZ)"
          LDFLAGS="-s -w \
            -X github.com/greensheep999/higgsgo/internal/version.Version=$VERSION \
            -X github.com/greensheep999/higgsgo/internal/version.Commit=$COMMIT \
            -X github.com/greensheep999/higgsgo/internal/version.BuildTime=$BUILD_TIME"
          go build -trimpath \
            -ldflags "$LDFLAGS" \
            -o dist/higgsgo-${GOOS}-${GOARCH} \
            ./cmd/higgsgo
          go build -trimpath \
            -ldflags "$LDFLAGS" \
            -o dist/higgsgo-cli-${GOOS}-${GOARCH} \
            ./cmd/higgsgo-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: higgsgo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"
          # GHCR tags must be lowercase. Some GitHub org / user names
          # carry mixed case (e.g. greenSheep999) so `github.repository_owner`
          # in isolation can't be interpolated straight into the tag.
          # Precompute a lowercased copy for the tag list below.
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/higgsgo:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/higgsgo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [binaries, docker]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
