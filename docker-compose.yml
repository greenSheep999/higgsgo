services:
  higgsgo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override at build-time to embed real metadata:
        #   docker compose build \
        #     --build-arg VERSION=v0.2.0 \
        #     --build-arg COMMIT=$(git rev-parse --short HEAD) \
        #     --build-arg BUILD_TIME=$(date -u +%FT%TZ)
        VERSION: dev
        COMMIT: none
        BUILD_TIME: unknown
    image: higgsgo:dev
    ports:
      - "18080:18080"
      - "18081:18081"
    environment:
      HIGGSGO_ADMIN_BEARER: "dev-admin"
      HIGGSGO_INTERNAL_BEARER: "dev-internal"
      # Route upstream traffic through a socks5 proxy. Leave empty for direct.
      HIGGSGO_UPSTREAM_PROXY_URL: ""
    volumes:
      - higgsgo-data:/app/data
      - ./configs:/app/configs:ro
    restart: unless-stopped
    command:
      - "-config"
      - "/app/configs/higgsgo.dev.toml"

volumes:
  higgsgo-data:
