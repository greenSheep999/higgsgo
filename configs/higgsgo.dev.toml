# higgsgo development configuration.
# Uses non-standard ports to avoid conflicts with common local services.

[server]
listen          = "127.0.0.1:18080"
admin_listen    = "127.0.0.1:18081"
internal_listen = "127.0.0.1:18082"
public_url      = "http://localhost:18080"
admin_bearer    = "dev-admin"
internal_bearer = "dev-internal"

# Per-API-key token bucket. Slightly looser in dev for quick iteration.
[server.rate_limit]
rps   = 10
burst = 20

# CORS allowlist for /admin/*. Matches the WebUI's Vite dev server (5173)
# and its `vite preview` port (4173).
[server.webui]
origins = ["http://localhost:5173", "http://localhost:4173"]

[storage]
driver = "sqlite"
[storage.sqlite]
path = "./data/higgsgo.db"

[http_client]
type = "utls"
[http_client.utls]
profile = "chrome_133"

# Dev tends to sit behind slower proxies; loosen the GET budgets slightly
# while keeping the create_job value in line with production so we still
# catch upstream regressions in that critical path.
[upstream.timeouts]
create_job   = "90s"
fetch_status = "20s"
fetch_job    = "30s"
fetch_wallet = "20s"
fetch_user   = "20s"
default      = "30s"

[proxy]
provider = "noop"

[[mailbox]]
type = "prompt"

[captcha]
provider = "manual"

[browser]
type = "cloak_nodejs"
[browser.cloak_nodejs]
node_bin      = "/usr/local/bin/node"
worker_script = "./adapters/browser/cloak-worker.mjs"
pool_size     = 1

[models]
path      = "./configs/models"
data_path = "./data/reference"

[pool]
max_in_flight_per_account  = 5
fail_streak_threshold      = 3
balance_refresh_interval   = "10m"
jwt_refresh_interval       = "40s"

[register]
auto_topup = false

[modes]
standalone = true
cpa_plugin = false

[tickers.a_regression]
interval      = "24h"
sample_size   = 5
enabled       = false               # off in dev; flip to true for local probe testing
skip_upstream = true                # never burn credits from a dev boot

[tickers.month_reset]
enabled  = false                    # off in dev to avoid racing SQLite on hot reload
interval = ""

[[notifiers]]
type      = "stdout"
min_level = "info"

[observability]
log_level    = "info"
log_format   = "json"
metrics_path = "/metrics"
