# higgsgo example configuration.
# Copy to higgsgo.dev.toml or higgsgo.prod.toml and adjust.
# All keys use snake_case. Env-var overrides use HIGGSGO_UPPER_SNAKE prefix.

[server]
listen          = "0.0.0.0:8080"
admin_listen    = "127.0.0.1:8081"
internal_listen = "127.0.0.1:8082"
public_url      = "http://localhost:8080"
# Shared secrets for the /admin/* and /internal/* surfaces.
# In production, prefer HIGGSGO_ADMIN_BEARER / HIGGSGO_INTERNAL_BEARER env vars.
admin_bearer    = "change-me-admin"
internal_bearer = "change-me-internal"

# Per-API-key token bucket on /v1/*. Applied AFTER APIKey auth.
# Absent / zero values fall back to defaults (rps=5, burst=10).
[server.rate_limit]
rps   = 5
burst = 10

# CORS allowlist for the /admin/* surface, consumed by the WebUI
# (deployed separately). Leave empty / commented out for same-origin
# deploys. Use ["*"] only in dev — it echoes the request Origin back so
# credentials still work, but any site could then talk to /admin.
[server.webui]
# origins = ["https://ops.example.com"]

[storage]
driver = "sqlite"                # "sqlite" | "postgres"
[storage.sqlite]
path = "./data/higgsgo.db"
[storage.postgres]
dsn = ""

[http_client]
type = "stdhttp"                 # "stdhttp" | "utls" | "impit_bridge"
[http_client.utls]
profile = "chrome_133"

# Per-endpoint request timeouts for the fnf.higgsfield.ai + clerk.higgsfield.ai
# client. Each value is a Go duration string. Empty / omitted values fall
# back to the built-in defaults documented next to each key. The transport
# Timeout on the utls client acts as an absolute ceiling above these values.
# [upstream.timeouts]
# create_job   = "90s"           # POST — may carry base64 image / video body
# fetch_status = "15s"           # GET /jobs/{id}/status — tiny payload
# fetch_job    = "30s"           # GET /jobs/{id} — full row
# fetch_wallet = "15s"           # GET /workspaces/wallet
# fetch_user   = "15s"           # GET /user
# default      = "30s"           # fallback for any endpoint not listed above

[proxy]
provider = "static"              # "static" | "711proxy" | "brightdata" | "noop"
[proxy.static]
file = "./configs/proxies.txt"

[[mailbox]]
type = "graph"
[mailbox.graph]
list_file = ""

[[mailbox]]
type = "destiny"
[mailbox.destiny]
web_url = "https://www.mail.destiny-mmo.com/domain"
supported_domains = [
  "headcc.io.vn", "sorashift.store", "hubcrypto.site",
  "daivietartex.bond", "vietnamcashewnuts.space",
  "vietnamcashewnuts.store", "pixelpho.space",
  "whisperwindwalruswhimsy.site",
]

[[mailbox]]
type = "prompt"

[captcha]
provider = "manual"              # "capsolver" | "twocaptcha" | "manual"
[captcha.capsolver]
api_key = ""
enable_datadome = true

[browser]
type = "cloak_nodejs"            # "cloak_nodejs" | "chromedp"
[browser.cloak_nodejs]
node_bin      = "/usr/local/bin/node"
worker_script = "./adapters/browser/cloak-worker.mjs"
pool_size     = 3

[models]
path             = "./configs/models"
data_path        = "./data/reference"
reload_on_signal = "SIGHUP"

[pool]
max_in_flight_per_account  = 5
fail_streak_threshold      = 3
balance_refresh_interval   = "10m"
jwt_refresh_interval       = "40s"

# Background claimer (internal/core/claimer). Every claim_interval it walks
# active accounts and posts /gifts/{id}/claim + the unlim-activation claim
# endpoint for anything left unclaimed. Read-only entitlement grab — never
# spends money and never feeds failover.
claim_enabled  = true
claim_interval = "15m"

# Background invoicewatch (internal/core/invoicewatch). Retries the failed
# auto-top-up charge for accounts with pending invoices, budgeted at 3
# attempts per account per 24h. Alerts Warn on the notifier chain once
# budget is spent.
invoice_watch_enabled  = true
invoice_watch_interval = "15m"

# Background costsync (internal/core/costsync). Every cost_sync_interval it
# pulls GET /job-sets/costs from one active account and pushes the JST →
# credit-hundredths overlay into the registry (SetDynamicCosts). Reload()
# does not clobber the overlay.
cost_sync_enabled  = true
cost_sync_interval = "6h"

# Background promowatch (internal/core/promowatch). Scans active accounts
# for near-expiry unviewed personal promos, cashback challenges ending
# mid-progress, and value-gated two-day offers; alert-only.
promo_watch_enabled  = true
promo_watch_interval = "30m"

# Refresher enhancement: also pulls GET /user/free-gens/v2 to calibrate the
# seven accounts.*_credits columns (the flat /user *_credits fields report
# a stale 0 for the soul family). Fetch failure is non-fatal.
free_gens_v2_enabled = true

# Replenish alerter (internal/core/replenish). 5-signal pool-depletion
# watchdog. Each signal is muted for 24h after firing (in-memory).
[replenish]
enabled                = true
interval               = "1m"
credit_floor           = 50        # S2: credits below this = exhausted
credit_exhaustion_pct  = 0.3       # S2: fire when exhausted fraction > this
plan_ending_days       = 3         # S5: window before plan_ends_at
plan_ending_threshold  = 1         # S5: minimum count in the window
min_unlim_pool_size    = 3         # S1: fire when active unlim holders < this
watched_job_set_types  = []        # S1: empty = skip S1

# Credit-ledger reconciliation (internal/core/creditrecon). Compares
# upstream /workspaces/credit-ledger/statistics against
# usage_events.charged_credits_h. Alert-only. Effective threshold =
# max(absolute_floor_credits × 100, upstream_h × relative_pct).
[credit_recon]
enabled                = true
interval               = "24h"
absolute_floor_credits = 100
relative_pct           = 0.05

[register]
auto_topup                     = false
min_starter_accounts           = 5
mail_list_file                 = ""
max_concurrent_registrations   = 2

[modes]
standalone = true                # Mode A: users hit /v1/* directly with our API key
cpa_plugin = false               # Mode B: expose /internal/* for CPA plugin

[tickers.a_regression]
cron          = "0 0 6 * * *"      # every day at 06:00 local (reserved for future cron scheduler)
interval      = "24h"              # Go-duration cadence honoured by the current ticker
sample_size   = 20
enabled       = false
skip_upstream = false              # true = record probes but do not call proxy (dev/test)

[tickers.x1_recheck]
cron    = "0 0 6 * * 0"          # every Sunday at 06:00
enabled = false

[tickers.body_drift]
cron    = "0 0 3 * * 1"          # every Monday at 03:00
enabled = false

[tickers.month_reset]
# Zero api_keys.monthly_used at each UTC calendar-month boundary. Leave
# 'interval' empty (or unset) for the production calendar-driven path;
# set to a short Go duration like "1s" only for local testing.
enabled  = true
interval = ""

# Notifier chain (internal/core/notifier). Each [[notifiers]] entry becomes
# a concrete notifier fanned out by the chain. The first entry that sets
# min_level wins for the whole chain (levels: info < warn < error <
# critical). An empty [[notifiers]] list still yields a stdout-only chain
# so downstream consumers (failover, replenish, invoicewatch, promowatch,
# creditrecon) always have a non-nil target.
[[notifiers]]
type      = "stdout"
min_level = "info"

# Slack destination. type="slack" with an empty webhook logs a warn on boot
# and is elided from the chain — safe to leave commented until real webhook
# is available.
# [[notifiers]]
# type = "slack"
# [notifiers.slack]
# webhook = "<paste your slack incoming-webhook URL>"

[observability]
log_level    = "info"
log_format   = "json"
metrics_path = "/metrics"

# Advisory update-checker. /admin/version/check polls this GitHub repo's
# latest release once per hour (per process, in-memory cache) so the WebUI
# can render an "update available" badge. The binary is never replaced;
# operators pull the new image / binary manually. Flip check_enabled = false
# to disable the outbound request entirely (endpoint still returns the
# current version).
[updates]
github_owner  = "greenSheep999"
github_repo   = "higgsgo"
check_enabled = true
